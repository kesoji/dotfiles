# プロンプト全体
format = """
$directory\
$git_branch\
$git_status\
$character"""

# 右プロンプト（実行時間・時刻）
right_format = "$cmd_duration$time"

# ディレクトリ
[directory]
truncation_length = 3
truncate_to_repo = true

# Git ブランチ
[git_branch]
format = "[$branch]($style) "
style = "bold purple"

# Git ステータス（差分があるかだけ分かればいい）
[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

# プロンプト記号
[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

# コマンド実行時間（2秒以上かかったら表示）
[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "bold yellow"

# 時刻
[time]
disabled = false
format = "[$time]($style)"
style = "dimmed white"
time_format = "%H:%M"

# 言語系は使うものだけ有効にし、残りは無効化
[nodejs]
format = "[$symbol($version)]($style) "
[golang]
format = "[$symbol($version)]($style) "
[python]
format = "[$symbol($version)]($style) "
[php]
format = "[$symbol($version)]($style) "
[rust]
disabled = true
[ruby]
disabled = true
[java]
disabled = true
[dotnet]
disabled = true
